# Solver IK por grupo (MoveIt2). Decisión F0 pendiente-de-fase: KDL vs
# TRAC-IK. Arrancamos con KDL (viene instalado); TRAC-IK se prueba en la
# mini-clase de F1b (mejor cerca de singularidades, mismo archivo, 1 línea).
left_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
right_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
